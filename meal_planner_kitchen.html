<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Kitchen Planner</title>
<style>
:root {
  --bg:#ffffff; --surface:#f9f7f4; --surface-2:#f0ede8;
  --border:#e8e4de; --border-strong:#d0cbc4;
  --text:#1a1916; --text-2:#5a5750; --text-muted:#9a978f;
  --accent:#2d6a4f; --accent-dark:#1a4a35; --accent-light:#eaf4ee;
  --warn:#92660a; --warn-dark:#92660a; --warn-light:#fef9ec;
  --blue:#4a7fc1; --blue-dark:#1e4a8a; --blue-light:#eaf0fb;
  --purple:#8b5cf6; --purple-dark:#6b3fa0; --purple-light:#f3eefb;
  --gold:#d97706;
  --radius:10px; --radius-lg:14px;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:16px;line-height:1.5;overflow-x:hidden;}

/* Header */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:50;}
.header h1{font-size:17px;font-weight:600;color:var(--text);}
.import-btn{background:var(--accent-dark);color:#fff;border:none;border-radius:var(--radius);padding:8px 16px;font-size:14px;font-weight:500;cursor:pointer;font-family:var(--font);}
.import-btn:active{opacity:.8;}
.import-status{font-size:12px;color:var(--text-muted);margin-left:8px;}

/* Tabs */
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);padding:0 8px;}
.tab{flex:1;padding:12px 8px;font-size:15px;font-weight:500;text-align:center;cursor:pointer;color:var(--text-muted);border-bottom:2px solid transparent;border-top:none;border-left:none;border-right:none;background:none;font-family:var(--font);}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}

.main{padding:16px;max-width:100%;}
.page{display:none;}
.page.active{display:block;}

/* Calendar */
.person-toggle{display:flex;border:1px solid var(--border-strong);border-radius:var(--radius);overflow:hidden;margin-bottom:16px;width:fit-content;}
.person-btn{padding:10px 24px;font-size:15px;font-weight:500;cursor:pointer;background:none;border:none;color:var(--text-muted);font-family:var(--font);}
.person-btn.active{background:var(--accent-dark);color:#fff;}
.cal-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.cal-grid{display:grid;grid-template-columns:70px repeat(7,1fr);gap:4px;min-width:520px;}
.cal-day-hdr{font-size:11px;font-weight:600;color:var(--text-muted);text-align:center;padding:6px 2px;}
.cal-row-lbl{font-size:11px;color:var(--text-muted);display:flex;align-items:flex-start;padding-top:8px;}
.meal-badge{display:inline-flex;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:500;background:var(--surface-2);border:1px solid var(--border);color:var(--text-2);}
.cal-cell{border:1px solid var(--border);border-radius:var(--radius);padding:6px 7px;min-height:58px;background:var(--surface);cursor:pointer;}
.cal-cell.has-main{background:var(--accent-light);border-color:var(--accent-dark);}
.cal-cell.skipped{background:var(--surface-2);}
.cell-name{font-size:10px;color:var(--accent);font-weight:600;line-height:1.3;}
.cell-div{border-top:1px solid var(--accent-dark);margin:3px 0;}
.skip-lbl{font-size:9px;color:var(--text-muted);font-style:italic;}
.add-hint{font-size:20px;color:var(--border-strong);text-align:center;margin-top:8px;}
.summary-grid{display:grid;grid-template-columns:70px repeat(7,1fr);gap:4px;min-width:520px;margin-top:4px;}
.summary-lbl{font-size:10px;color:var(--text-muted);display:flex;align-items:center;}
.summary-cell{border-radius:var(--radius);padding:5px 3px;font-size:9px;text-align:center;line-height:1.5;}
.summary-cell.green{background:#eaf4ee;color:#2d6a4f;}
.summary-cell.yellow{background:#fef9ec;color:#92660a;}
.summary-cell.red{background:#fdf1f1;color:#c0392b;}
.summary-cell.neutral{background:var(--surface-2);color:var(--text-muted);}
.summary-cell .sv{font-weight:700;font-size:10px;}

/* Recipe detail panel */
.recipe-detail{display:none;position:fixed;inset:0;background:var(--bg);z-index:100;overflow-y:auto;padding:16px;}
.recipe-detail.open{display:block;}
.detail-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;position:sticky;top:0;background:var(--bg);padding-bottom:12px;border-bottom:1px solid var(--border);}
.back-btn{background:var(--surface-2);border:none;border-radius:var(--radius);padding:10px 16px;font-size:15px;color:var(--text);cursor:pointer;font-family:var(--font);}
.detail-title{font-size:18px;font-weight:600;flex:1;}
.source-btn{background:var(--accent-dark);color:#fff;border:none;border-radius:var(--radius);padding:10px 16px;font-size:14px;font-weight:500;cursor:pointer;font-family:var(--font);text-decoration:none;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;}
.macros{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:16px;}
.macro-chip{background:var(--surface-2);border-radius:var(--radius);padding:10px 8px;text-align:center;}
.macro-val{font-size:15px;font-weight:600;color:var(--text);}
.macro-label{font-size:11px;color:var(--text-muted);margin-top:2px;}
.detail-section{margin-bottom:20px;}
.detail-label{font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}
.ing-list{list-style:none;}
.ing-list li{font-size:15px;color:var(--text-2);padding:5px 0;border-bottom:1px solid var(--border);}
.ing-list li:last-child{border-bottom:none;}
.ing-list li::before{content:"· ";color:var(--text-muted);}
.instructions-text{font-size:15px;color:var(--text-2);line-height:1.8;white-space:pre-wrap;}

/* Recipe cards list */
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px;}
.filter-chip{padding:8px 16px;border-radius:20px;font-size:14px;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text-2);font-family:var(--font);white-space:nowrap;}
.filter-chip.active{background:var(--accent-dark);color:#fff;border-color:var(--accent-dark);}
.recipe-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:12px;cursor:pointer;active:opacity:.8;}
.recipe-card:active{opacity:.8;}
.recipe-name{font-size:17px;font-weight:600;color:var(--text);margin-bottom:4px;}
.recipe-meta{font-size:13px;color:var(--text-muted);display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;}
.recipe-macros{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;}
.r-macro{background:var(--surface-2);border-radius:8px;padding:6px 4px;text-align:center;}
.r-macro-val{font-size:13px;font-weight:600;color:var(--text);}
.r-macro-lbl{font-size:10px;color:var(--text-muted);}
.new-badge{display:inline-flex;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;background:var(--warn-light);color:var(--warn);border:1px solid var(--warn-dark);margin-left:8px;}

/* Meal Prep */
.prep-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:12px;}
.prep-card-title{font-size:16px;font-weight:600;color:var(--text);margin-bottom:12px;}
.prep-section-title{font-size:13px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.prep-section{margin-bottom:16px;}
.prep-task{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
.prep-task:last-child{border-bottom:none;}
.prep-task input[type=checkbox]{width:20px;height:20px;flex-shrink:0;margin-top:2px;accent-color:var(--accent);cursor:pointer;}
.prep-task.done .prep-task-text{text-decoration:line-through;color:var(--text-muted);}
.prep-task-text{font-size:15px;color:var(--text);flex:1;line-height:1.5;}
.prep-task-meta{font-size:12px;color:var(--text-muted);margin-top:3px;display:flex;gap:10px;}
.prep-task-meta .recipe-ref{color:var(--accent);}
.day-of-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:15px;color:var(--text-2);}
.day-of-item:last-child{border-bottom:none;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--accent);margin-top:6px;flex-shrink:0;}
.tip-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:15px;color:var(--text-2);}
.tip-item:last-child{border-bottom:none;}
.prep-note{font-size:14px;color:var(--text-2);background:var(--surface-2);border-radius:var(--radius);padding:12px;line-height:1.6;margin-bottom:12px;}
.prep-recipe-chip{display:inline-flex;padding:4px 12px;border-radius:20px;font-size:13px;background:var(--accent-light);color:var(--accent);border:1px solid var(--accent-dark);margin:3px;}

/* Empty / loading states */
.empty{text-align:center;padding:60px 16px;color:var(--text-muted);}
.empty-icon{font-size:40px;margin-bottom:12px;}
.empty-text{font-size:16px;}
.loading{text-align:center;padding:40px;color:var(--text-muted);font-size:15px;}
</style>
</head>
<body>

<div class="header">
  <h1>Kitchen Planner</h1>
  <div style="display:flex;align-items:center;gap:8px;">
    <span class="import-status" id="import-status"></span>
    <button class="import-btn" onclick="importData()">Load latest data</button>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="showTab('calendar')">Calendar</button>
  <button class="tab" onclick="showTab('recipes')">Recipes</button>
  <button class="tab" onclick="showTab('mealprep')">Meal Prep</button>
</div>

<div class="main">

  <!-- CALENDAR -->
  <div class="page active" id="tab-calendar">
    <div class="person-toggle">
      <button class="person-btn active" id="btn-emma" onclick="setPerson('emma')">Emma</button>
      <button class="person-btn" id="btn-seth" onclick="setPerson('seth')">Seth</button>
    </div>
    <div class="cal-wrap">
      <div class="cal-grid" id="cal-grid"></div>
      <div class="summary-grid" id="summary-grid"></div>
    </div>
    <div class="empty" id="cal-empty" style="display:none">
      <div class="empty-icon">📅</div>
      <div class="empty-text">No calendar data yet. Load latest data first.</div>
    </div>
  </div>

  <!-- RECIPES -->
  <div class="page" id="tab-recipes">
    <div class="filter-row">
      <button class="filter-chip active" onclick="setFilter('all',this)">All</button>
      <button class="filter-chip" onclick="setFilter('breakfast',this)">Breakfast</button>
      <button class="filter-chip" onclick="setFilter('lunch',this)">Lunch</button>
      <button class="filter-chip" onclick="setFilter('dinner',this)">Dinner</button>
      <button class="filter-chip" onclick="setFilter('snack',this)">Snack</button>
    </div>
    <div id="recipes-list"></div>
    <div class="empty" id="recipes-empty" style="display:none">
      <div class="empty-icon">🥗</div>
      <div class="empty-text">No recipes yet. Load latest data first.</div>
    </div>
  </div>

  <!-- MEAL PREP -->
  <div class="page" id="tab-mealprep">
    <div id="prep-content"></div>
    <div class="empty" id="prep-empty">
      <div class="empty-icon">🥘</div>
      <div class="empty-text">No meal prep plan yet. Load latest data first.</div>
    </div>
  </div>

</div>

<!-- RECIPE DETAIL OVERLAY -->
<div class="recipe-detail" id="recipe-detail">
  <div class="detail-header">
    <button class="back-btn" onclick="closeDetail()">← Back</button>
    <div class="detail-title" id="detail-title"></div>
    <a class="source-btn" id="detail-source-btn" href="#" target="_blank" style="display:none">Visit site ↗</a>
  </div>
  <div id="detail-body"></div>
</div>

<script>
var recipes=[], calData={emma:{},seth:{}}, prepPlan=null;
var activePerson='emma', recipeFilter='all';
var DAYS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
var MEALS=['Breakfast','Lunch','Dinner','Snack'];
var EMMA={calLow:1700,calHigh:1900,calYellow:100,protein:90,fiber:15};
var NEW_DAYS=14;

function isNew(r){return r.mark_new||(r.added_at&&(Date.now()-new Date(r.added_at).getTime())<NEW_DAYS*864e5);}
function getR(id){return recipes.find(function(r){return r.id===id;});}
function getSlotIds(e){if(!e)return [];if(e.ids)return e.ids;var ids=[];if(e.mainId)ids.push(e.mainId);if(e.sideId)ids.push(e.sideId);return ids;}

// ── IMPORT ────────────────────────────────────────────
function importData(){
  var statusEl=document.getElementById('import-status');
  statusEl.textContent='Loading...';
  // Try to fetch meal_data.json from same server
  fetch('https://emma1-ux.github.io/meal-planner/meal_data.json?t='+Date.now())
    .then(function(r){
      if(!r.ok) throw new Error('File not found ('+r.status+')');
      return r.json();
    })
    .then(function(data){
      if(data.recipes) recipes=data.recipes;
      if(data.calendar) calData=data.calendar;
      if(data.prep_plan) prepPlan=data.prep_plan;
      if(!calData.emma) calData.emma={};
      if(!calData.seth) calData.seth={};
      var d=new Date(data.exported||Date.now());
      statusEl.textContent='Updated '+d.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
      renderAll();
    })
    .catch(function(e){
      statusEl.textContent='Error: '+e.message;
    });
}

function renderAll(){
  renderCalendar();
  renderRecipes();
  renderPrepPlan();
}

// ── TABS ──────────────────────────────────────────────
function showTab(t){
  document.querySelectorAll('.tab').forEach(function(el,i){el.classList.toggle('active',['calendar','recipes','mealprep'][i]===t);});
  document.querySelectorAll('.page').forEach(function(el){el.classList.remove('active');});
  document.getElementById('tab-'+t).classList.add('active');
}

// ── CALENDAR ──────────────────────────────────────────
function setPerson(p){
  activePerson=p;
  document.getElementById('btn-emma').classList.toggle('active',p==='emma');
  document.getElementById('btn-seth').classList.toggle('active',p==='seth');
  renderCalendar();
}

function dayMacros(person,day){
  var cal=0,pro=0,fib=0;
  MEALS.forEach(function(meal){
    var e=calData[person][day+'-'+meal];
    if(!e||e.skip)return;
    getSlotIds(e).forEach(function(id){var r=getR(id);if(!r)return;cal+=r.macros_per_serving.calories||0;pro+=r.macros_per_serving.protein_g||0;fib+=r.macros_per_serving.fiber_g||0;});
  });
  return{cal:Math.round(cal),pro:Math.round(pro),fib:Math.round(fib)};
}
function calColor(c){if(c>=EMMA.calLow&&c<=EMMA.calHigh)return 'green';if(c>=EMMA.calLow-EMMA.calYellow&&c<=EMMA.calHigh+EMMA.calYellow)return 'yellow';return 'red';}
function goalColor(v,t){if(v>=t)return 'green';if(v>=t*0.85)return 'yellow';return 'red';}
function worstColor(arr){var rank={green:0,yellow:1,red:2};return arr.slice().sort(function(a,b){return rank[b]-rank[a];})[0];}

function renderCalendar(){
  var cal=calData[activePerson];
  var isEmma=activePerson==='emma';
  var hasAny=Object.keys(cal).length>0;
  document.getElementById('cal-empty').style.display=hasAny?'none':'block';
  if(!hasAny){document.getElementById('cal-grid').innerHTML='';document.getElementById('summary-grid').innerHTML='';return;}
  var html='<div></div>'+DAYS.map(function(d){return '<div class="cal-day-hdr">'+d+'</div>';}).join('');
  MEALS.forEach(function(meal){
    html+='<div class="cal-row-lbl"><span class="meal-badge">'+meal.slice(0,3)+'</span></div>';
    DAYS.forEach(function(day){
      var key=day+'-'+meal;
      var e=cal[key]||{};
      var ids=getSlotIds(e);
      var slotRecipes=ids.map(function(id){return getR(id);}).filter(Boolean);
      var hasItems=slotRecipes.length>0;
      var cls='cal-cell'+(hasItems?' has-main':'')+(e.skip?' skipped':'');
      html+='<div class="'+cls+'" data-calkey="'+key+'">';
      if(e.skip){html+='<div class="skip-lbl">Skip</div>';}
      else if(hasItems){html+=slotRecipes.map(function(r,i){return (i>0?'<div class="cell-div"></div>':'')+'<div class="cell-name">'+r.name+'</div>';}).join('');}
      else{html+='<div class="add-hint">·</div>';}
      html+='</div>';
    });
  });
  document.getElementById('cal-grid').innerHTML=html;
  document.getElementById('cal-grid').onclick=function(ev){
    var cell=ev.target.closest('[data-calkey]');
    if(!cell)return;
    var key=cell.getAttribute('data-calkey');
    var e=cal[key]||{};
    var ids=getSlotIds(e);
    if(!ids.length)return;
    // Show first recipe detail
    var r=getR(ids[0]);
    if(r) openDetail(r);
  };
  var shtml='<div class="summary-lbl">Totals</div>';
  DAYS.forEach(function(day){
    var m=dayMacros(activePerson,day);
    if(m.cal===0&&m.pro===0){shtml+='<div class="summary-cell neutral">&mdash;</div>';return;}
    if(isEmma){var o=worstColor([calColor(m.cal),goalColor(m.pro,EMMA.protein),goalColor(m.fib,EMMA.fiber)]);shtml+='<div class="summary-cell '+o+'"><div class="sv">'+m.cal+'</div><div>'+m.pro+'P</div><div>'+m.fib+'F</div></div>';}
    else{shtml+='<div class="summary-cell neutral"><div class="sv">'+m.cal+'</div><div>'+m.pro+'P</div></div>';}
  });
  document.getElementById('summary-grid').innerHTML=shtml;
}

// ── RECIPES ───────────────────────────────────────────
function setFilter(f,el){
  recipeFilter=f;
  document.querySelectorAll('.filter-chip').forEach(function(c){c.classList.remove('active');});
  el.classList.add('active');
  renderRecipes();
}

function renderRecipes(){
  var ORDER=['breakfast','lunch','dinner','snack','side'];
  var list=recipes.filter(function(r){
    if(recipeFilter==='all') return true;
    return r.meal_type===recipeFilter;
  }).slice().sort(function(a,b){
    var ai=ORDER.indexOf(a.meal_type),bi=ORDER.indexOf(b.meal_type);
    if(ai!==bi)return ai-bi;
    return a.name.localeCompare(b.name);
  });
  var empty=document.getElementById('recipes-empty');
  var listEl=document.getElementById('recipes-list');
  if(!list.length){listEl.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  listEl.innerHTML=list.map(function(r){
    var newFlag=isNew(r);
    return '<div class="recipe-card" data-rid="'+r.id+'">'+
      '<div style="display:flex;align-items:flex-start;justify-content:space-between">'+
      '<div class="recipe-name">'+r.name+(newFlag?'<span class="new-badge">New</span>':'')+'</div>'+
      '</div>'+
      '<div class="recipe-meta">'+
      '<span>'+r.meal_type+'</span>'+
      '<span>'+r.servings+' srv</span>'+
      '<span>'+r.prep_time+' prep</span>'+
      '<span>'+r.cook_time+' cook</span>'+
      '</div>'+
      '<div class="recipe-macros">'+
      '<div class="r-macro"><div class="r-macro-val">'+r.macros_per_serving.calories+'</div><div class="r-macro-lbl">kcal</div></div>'+
      '<div class="r-macro"><div class="r-macro-val">'+r.macros_per_serving.protein_g+'g</div><div class="r-macro-lbl">protein</div></div>'+
      '<div class="r-macro"><div class="r-macro-val">'+(r.macros_per_serving.fiber_g||0)+'g</div><div class="r-macro-lbl">fiber</div></div>'+
      '<div class="r-macro"><div class="r-macro-val">'+r.macros_per_serving.carbs_g+'g</div><div class="r-macro-lbl">carbs</div></div>'+
      '<div class="r-macro"><div class="r-macro-val">'+r.macros_per_serving.fat_g+'g</div><div class="r-macro-lbl">fat</div></div>'+
      '</div>'+
      '</div>';
  }).join('');
  listEl.onclick=function(ev){
    var card=ev.target.closest('[data-rid]');
    if(!card)return;
    var r=getR(parseInt(card.getAttribute('data-rid')));
    if(r) openDetail(r);
  };
}

// ── RECIPE DETAIL ─────────────────────────────────────
function openDetail(r){
  document.getElementById('detail-title').textContent=r.name;
  var srcBtn=document.getElementById('detail-source-btn');
  if(r.source_url){srcBtn.href=r.source_url;srcBtn.style.display='inline-flex';srcBtn.textContent=r.source||'Visit site'+' \u2197';}
  else if(r.source){srcBtn.style.display='none';}
  else{srcBtn.style.display='none';}
  var html='';
  html+='<div class="macros" style="margin-bottom:16px">'+
    '<div class="macro-chip"><div class="macro-val">'+r.macros_per_serving.calories+'</div><div class="macro-label">kcal</div></div>'+
    '<div class="macro-chip"><div class="macro-val">'+r.macros_per_serving.protein_g+'g</div><div class="macro-label">protein</div></div>'+
    '<div class="macro-chip"><div class="macro-val">'+(r.macros_per_serving.fiber_g||0)+'g</div><div class="macro-label">fiber</div></div>'+
    '<div class="macro-chip"><div class="macro-val">'+r.macros_per_serving.carbs_g+'g</div><div class="macro-label">carbs</div></div>'+
    '<div class="macro-chip"><div class="macro-val">'+r.macros_per_serving.fat_g+'g</div><div class="macro-label">fat</div></div>'+
    '</div>';
  if(r.ingredients&&r.ingredients.length){
    html+='<div class="detail-section"><div class="detail-label">Ingredients ('+r.servings+' servings)</div>'+
      '<ul class="ing-list">'+r.ingredients.map(function(i){return '<li>'+(i.amount?i.amount+' ':'')+( i.unit?i.unit+' ':'')+i.item+'</li>';}).join('')+'</ul></div>';
  }
  if(r.instructions){
    html+='<div class="detail-section"><div class="detail-label">Instructions</div>'+
      '<div class="instructions-text">'+r.instructions.replace(/</g,'&lt;')+'</div></div>';
  }
  document.getElementById('detail-body').innerHTML=html;
  document.getElementById('recipe-detail').classList.add('open');
  window.scrollTo(0,0);
}
function closeDetail(){document.getElementById('recipe-detail').classList.remove('open');}

// ── MEAL PREP ─────────────────────────────────────────
function renderPrepPlan(){
  var contentEl=document.getElementById('prep-content');
  var emptyEl=document.getElementById('prep-empty');
  if(!prepPlan){contentEl.innerHTML='';emptyEl.style.display='block';return;}
  emptyEl.style.display='none';
  var plan=prepPlan;
  var html='';
  if(plan.summary){
    html+='<div class="prep-card"><div class="prep-note">'+plan.summary+'</div>';
    if(plan.total_prep_time){html+='<div style="font-size:13px;color:var(--text-muted)">Estimated time: '+plan.total_prep_time+'</div>';}
    html+='</div>';
  }
  if(plan.prep_day_tasks&&plan.prep_day_tasks.length){
    html+='<div class="prep-card"><div class="prep-card-title">Prep day tasks</div>';
    plan.prep_day_tasks.forEach(function(group,gi){
      html+='<div class="prep-section"><div class="prep-section-title">'+group.category+'</div>';
      (group.tasks||[]).forEach(function(t,ti){
        var tid='kt-'+gi+'-'+ti;
        html+='<div class="prep-task" data-taskid="'+tid+'"><input type="checkbox" data-check="true"><div style="flex:1"><div class="prep-task-text">'+t.task+'</div><div class="prep-task-meta">'+(t.time?'<span>'+t.time+'</span>':'')+(t.recipe?'<span class="recipe-ref">'+t.recipe+'</span>':'')+'</div></div></div>';
      });
      html+='</div>';
    });
    html+='</div>';
  }
  if(plan.day_of_tasks&&plan.day_of_tasks.length){
    html+='<div class="prep-card"><div class="prep-card-title">Day-of tasks</div>';
    plan.day_of_tasks.forEach(function(item){
      html+='<div class="prep-section"><div class="prep-section-title">'+item.meal+'</div>';
      (item.tasks||[]).forEach(function(t){html+='<div class="day-of-item"><div class="dot"></div><div>'+t+'</div></div>';});
      html+='</div>';
    });
    html+='</div>';
  }
  if(plan.tips&&plan.tips.length){
    html+='<div class="prep-card"><div class="prep-card-title">Tips</div>';
    plan.tips.forEach(function(tip){html+='<div class="tip-item"><div class="dot" style="background:var(--gold)"></div><div>'+tip+'</div></div>';});
    html+='</div>';
  }
  contentEl.innerHTML=html;
  contentEl.addEventListener('change',function(ev){
    if(ev.target.getAttribute('data-check')){
      ev.target.closest('.prep-task').classList.toggle('done',ev.target.checked);
    }
  });
}

// Auto-try import on load
importData();
</script>
</body>
